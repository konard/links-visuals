<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Links Grid</title>

  <style>
    html, body { margin:0; padding:0; background:#E0F7FA; height:100%; overflow:hidden; }
    svg        { display:block; touch-action:none; }

    /* ---- config panel ---- */
    #config-panel{
      position:fixed; bottom:1vmin; right:1vmin; z-index:10;
      background:rgba(0,0,128,.5); color:#fff;
      padding:0.7vmin; font:clamp(9px,1.2vmin,14px)/1.3 "Consolas","Courier New",monospace;
      border-radius:0.4vmin;
      transition: opacity 0.2s;
    }
    #config-panel label{ display:block; margin-bottom:0.3vmin; }
    #config-panel input[type=range]{ width:12vw; min-width:80px; vertical-align:middle; }
    #config-panel .val{ display:inline-block; width:3vw; min-width:28px; text-align:right; }
    #config-panel button{
      width:100%;
      background:rgba(255,255,255,0.15); color:#fff;
      border:1px solid rgba(255,255,255,0.4); border-radius:0.3vmin;
      padding:0.3vmin 0.6vmin; font-size:inherit; cursor:pointer;
      margin-top:0.3vmin;
    }
    #config-panel button:hover { background:rgba(255,255,255,0.3); }

    /* ---- toggle button ---- */
    #toggle-panels{
      position:fixed; top:1vmin; right:1vmin;
      background:rgba(0,0,128,.7); color:#fff;
      border:none; border-radius:0.4vmin;
      padding:0.6vmin 1vmin; font-size:clamp(10px,1.4vmin,16px);
      cursor:pointer; z-index:100;
      line-height:1;
    }
    #toggle-panels:hover{ background:rgba(0,0,128,.9); }

    /* ---- hidden state ---- */
    .panels-hidden #config-panel { opacity:0; pointer-events:none; }

    /* ---- mobile layout (< 600px) ---- */
    @media (max-width:599px){
      #config-panel{
        bottom:0; left:0; right:0;
        border-radius:0; padding:1.5vw;
        font-size:clamp(12px,3.5vw,16px);
      }
      #config-panel input[type=range]{
        width:50vw; min-width:120px;
        height:28px;
      }
      #config-panel .val{ width:8vw; min-width:36px; }
      #toggle-panels{
        top:1.5vw; right:1.5vw;
        font-size:clamp(14px,4vw,20px);
        padding:1vw 1.5vw;
      }
    }
  </style>
</head>
<body>
  <div id="config-panel">
    <label>Links: <input type="range" id="linkCountSlider" min="1" max="64" value="4" step="1"> <span class="val" id="linkCountVal">4</span></label>
    <button id="resetBtn" title="Reset layout to defaults">Reset</button>
  </div>

  <button id="toggle-panels" title="Show/hide panels">&#9776;</button>

  <script type="module">
    const { use } = await import("https://esm.sh/use-m");
    (async () => {
      const d3 = await use('d3');

      const { computeIntermediatePoints } = await import('./js/ik-pure.mjs');
      const {
        paddingFraction, radiusFraction, strokeFraction,
        sideTolFraction, IK_SEG_COUNT, snapFraction,
        MIN_SCALE, MAX_SCALE
      } = await import('./js/constants.mjs');
      const {
        vectorAdd, vectorSubtract, vectorScale, offsetPoint
      } = await import('./js/geometry.mjs');

      // ---- Constants (from blueprint defaults) ----
      const START_OFFSET_FRACTION = 0.10;
      const END_OFFSET_FRACTION   = 0.16;

      // ---- LocalStorage ----
      const STORAGE_KEY = 'grid-settings';

      function saveSettings() {
        try {
          const linkPositions = links.map(l => ({
            start: { x: l.start.x, y: l.start.y },
            center: { x: l.center.x, y: l.center.y },
            end: { x: l.end.x, y: l.end.y },
          }));
          localStorage.setItem(STORAGE_KEY, JSON.stringify({ linkCount, linkPositions }));
        } catch {}
      }

      function loadSettings() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return null;
          return JSON.parse(raw);
        } catch { return null; }
      }

      // ---- State ----
      let linkCount = 4;
      let width = 0, height = 0;
      let links = [];       // per-link state: { start, center, end, ik, preferRight, preferLeft }
      let isDragging = false; // true when a control point is being dragged

      // Zoom/pan state
      let canvasScale = 1, canvasOffsetX = 0, canvasOffsetY = 0;
      let isPanning = false, panStartX = 0, panStartY = 0, panOffsetStartX = 0, panOffsetStartY = 0;

      // Touch state
      const activeTouches = {};
      let lastPinchDistance = null, lastPinchMidX = null, lastPinchMidY = null;
      let isTouchPanning = false, touchPanStartX = 0, touchPanStartY = 0;
      let touchOffsetStartX = 0, touchOffsetStartY = 0;

      // Restore saved settings
      const saved = loadSettings();
      if (saved && saved.linkCount != null) {
        linkCount = Math.max(1, Math.min(64, saved.linkCount));
      }

      // ---- SVG setup ----
      const svgElement = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      const svg = d3.select("body").append(() => svgElement);
      svg.attr("overflow", "visible").style("pointer-events", "all");
      const defs = svg.append("defs");
      const gridGroup = svg.insert("g", ":first-child").attr("class", "grid");
      const linksGroup = svg.append("g").attr("class", "links");

      // ---- Panels toggle ----
      const toggleButton = document.getElementById("toggle-panels");
      let panelsVisible = true;
      toggleButton.addEventListener("click", () => {
        panelsVisible = !panelsVisible;
        document.body.classList.toggle("panels-hidden", !panelsVisible);
        toggleButton.textContent = panelsVisible ? "\u2630" : "\u2715";
      });

      // ---- Slider ----
      const linkCountSlider = document.getElementById("linkCountSlider");
      const linkCountVal    = document.getElementById("linkCountVal");
      linkCountSlider.value = linkCount;
      linkCountVal.textContent = linkCount;

      linkCountSlider.addEventListener("input", () => {
        linkCount = parseInt(linkCountSlider.value, 10);
        linkCountVal.textContent = linkCount;
        initLinks();
        render();
        saveSettings();
      });

      // ---- Reset ----
      document.getElementById("resetBtn").addEventListener("click", () => {
        localStorage.removeItem(STORAGE_KEY);
        linkCount = 4;
        linkCountSlider.value = 4;
        linkCountVal.textContent = "4";
        canvasScale = 1;
        canvasOffsetX = 0;
        canvasOffsetY = 0;
        applyTransform();
        initLinks();
        render();
      });

      // ---- Zoom/pan (from blueprint best practices) ----
      function applyTransform() {
        svg.style("transform",
          `translate(${canvasOffsetX}px, ${canvasOffsetY}px) scale(${canvasScale})`);
        svg.style("transform-origin", "0 0");
      }

      function screenToWorld(clientX, clientY) {
        return {
          x: (clientX - canvasOffsetX) / canvasScale,
          y: (clientY - canvasOffsetY) / canvasScale
        };
      }

      function handleWheel(event) {
        if (event.target.closest('#config-panel, #toggle-panels')) return;
        event.preventDefault();
        const delta    = event.deltaMode === 1 ? event.deltaY * 24 : event.deltaY;
        const factor   = Math.pow(0.999, delta);
        const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, canvasScale * factor));
        if (newScale === canvasScale) return;
        const pivotX = (event.clientX - canvasOffsetX) / canvasScale;
        const pivotY = (event.clientY - canvasOffsetY) / canvasScale;
        canvasOffsetX = event.clientX - pivotX * newScale;
        canvasOffsetY = event.clientY - pivotY * newScale;
        canvasScale = newScale;
        applyTransform();
      }

      function handleMouseDown(event) {
        if (event.target.closest('#config-panel, #toggle-panels')) return;
        if (isDragging) return;
        isPanning = true;
        panStartX = event.clientX;
        panStartY = event.clientY;
        panOffsetStartX = canvasOffsetX;
        panOffsetStartY = canvasOffsetY;
        document.body.style.cursor = "grabbing";
        event.preventDefault();
      }

      function handleMouseMove(event) {
        if (!isPanning) return;
        canvasOffsetX = panOffsetStartX + (event.clientX - panStartX);
        canvasOffsetY = panOffsetStartY + (event.clientY - panStartY);
        applyTransform();
      }

      function handleMouseUp() {
        if (isPanning) { isPanning = false; document.body.style.cursor = ""; }
      }

      function handleTouchStart(event) {
        if (event.target.closest('#config-panel, #toggle-panels')) return;
        if (isDragging) return;
        event.preventDefault();
        for (const t of event.changedTouches) activeTouches[t.identifier] = t;
        const ids = Object.keys(activeTouches);
        if (ids.length === 2) {
          lastPinchDistance = null;
          isTouchPanning = false;
        } else if (ids.length === 1) {
          const t = event.changedTouches[0];
          isTouchPanning = true;
          touchPanStartX = t.clientX; touchPanStartY = t.clientY;
          touchOffsetStartX = canvasOffsetX; touchOffsetStartY = canvasOffsetY;
        }
      }

      function handleTouchMove(event) {
        if (isDragging) return;
        event.preventDefault();
        for (const t of event.changedTouches) activeTouches[t.identifier] = t;
        const ids = Object.keys(activeTouches);
        if (ids.length >= 2) {
          const t0 = activeTouches[ids[0]], t1 = activeTouches[ids[1]];
          const dist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
          const midX = (t0.clientX + t1.clientX) / 2, midY = (t0.clientY + t1.clientY) / 2;
          if (lastPinchDistance !== null) {
            const factor = dist / lastPinchDistance;
            const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, canvasScale * factor));
            const pivotX = (midX - canvasOffsetX) / canvasScale;
            const pivotY = (midY - canvasOffsetY) / canvasScale;
            canvasOffsetX = midX - pivotX * newScale;
            canvasOffsetY = midY - pivotY * newScale;
            canvasScale = newScale;
            canvasOffsetX += midX - lastPinchMidX;
            canvasOffsetY += midY - lastPinchMidY;
            applyTransform();
          }
          lastPinchDistance = dist; lastPinchMidX = midX; lastPinchMidY = midY;
        } else if (ids.length === 1 && isTouchPanning) {
          const t = activeTouches[ids[0]];
          canvasOffsetX = touchOffsetStartX + (t.clientX - touchPanStartX);
          canvasOffsetY = touchOffsetStartY + (t.clientY - touchPanStartY);
          applyTransform();
        }
      }

      function handleTouchEnd(event) {
        for (const t of event.changedTouches) delete activeTouches[t.identifier];
        if (Object.keys(activeTouches).length < 2) lastPinchDistance = null;
        if (Object.keys(activeTouches).length === 0) isTouchPanning = false;
      }

      document.addEventListener("wheel", handleWheel, { passive: false });
      document.addEventListener("mousedown", handleMouseDown);
      window.addEventListener("mousemove", handleMouseMove);
      window.addEventListener("mouseup", handleMouseUp);
      document.addEventListener("touchstart", handleTouchStart, { passive: false });
      document.addEventListener("touchmove", handleTouchMove, { passive: false });
      document.addEventListener("touchend", handleTouchEnd, { passive: false });
      document.addEventListener("touchcancel", handleTouchEnd, { passive: false });

      // ---- Grid drawing (infinite background grid from blueprint) ----
      const GRID_EXTENT = 1e6;

      function drawBackgroundGrid(centerX, centerY, gridSpacing, halfSpacing) {
        gridGroup.selectAll("*").remove();
        defs.select("#grid-pattern-minor").remove();
        defs.select("#grid-pattern-major").remove();

        const minorPattern = defs.append("pattern")
          .attr("id", "grid-pattern-minor")
          .attr("x", ((centerX % halfSpacing) + halfSpacing) % halfSpacing)
          .attr("y", ((centerY % halfSpacing) + halfSpacing) % halfSpacing)
          .attr("width", halfSpacing).attr("height", halfSpacing)
          .attr("patternUnits", "userSpaceOnUse");
        minorPattern.append("line")
          .attr("x1", halfSpacing).attr("y1", 0).attr("x2", halfSpacing).attr("y2", halfSpacing)
          .attr("stroke", "white").attr("stroke-width", 0.5).attr("opacity", 0.5);
        minorPattern.append("line")
          .attr("x1", 0).attr("y1", halfSpacing).attr("x2", halfSpacing).attr("y2", halfSpacing)
          .attr("stroke", "white").attr("stroke-width", 0.5).attr("opacity", 0.5);

        const majorPattern = defs.append("pattern")
          .attr("id", "grid-pattern-major")
          .attr("x", ((centerX % gridSpacing) + gridSpacing) % gridSpacing)
          .attr("y", ((centerY % gridSpacing) + gridSpacing) % gridSpacing)
          .attr("width", gridSpacing).attr("height", gridSpacing)
          .attr("patternUnits", "userSpaceOnUse");
        majorPattern.append("line")
          .attr("x1", gridSpacing).attr("y1", 0).attr("x2", gridSpacing).attr("y2", gridSpacing)
          .attr("stroke", "white").attr("stroke-width", 1).attr("opacity", 0.8);
        majorPattern.append("line")
          .attr("x1", 0).attr("y1", gridSpacing).attr("x2", gridSpacing).attr("y2", gridSpacing)
          .attr("stroke", "white").attr("stroke-width", 1).attr("opacity", 0.8);

        gridGroup.append("rect")
          .attr("x", -GRID_EXTENT).attr("y", -GRID_EXTENT)
          .attr("width", 2 * GRID_EXTENT).attr("height", 2 * GRID_EXTENT)
          .attr("fill", "url(#grid-pattern-minor)");
        gridGroup.append("rect")
          .attr("x", -GRID_EXTENT).attr("y", -GRID_EXTENT)
          .attr("width", 2 * GRID_EXTENT).attr("height", 2 * GRID_EXTENT)
          .attr("fill", "url(#grid-pattern-major)");
      }

      // ---- Color generation ----
      function getLinkColor(index, total) {
        const hue = (index / total) * 360;
        return `hsl(${hue}, 80%, 45%)`;
      }

      function getLinkColorHex(index, total) {
        const hue = (index / total) * 360;
        const s = 0.80, l = 0.45;
        const c = (1 - Math.abs(2 * l - 1)) * s;
        const x = c * (1 - Math.abs((hue / 60) % 2 - 1));
        const m = l - c / 2;
        let r, g, b;
        if (hue < 60)       { r = c; g = x; b = 0; }
        else if (hue < 120) { r = x; g = c; b = 0; }
        else if (hue < 180) { r = 0; g = c; b = x; }
        else if (hue < 240) { r = 0; g = x; b = c; }
        else if (hue < 300) { r = x; g = 0; b = c; }
        else                { r = c; g = 0; b = x; }
        const toHex = v => Math.round((v + m) * 255).toString(16).padStart(2, '0');
        return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
      }

      // ---- Markers (per-link colored, from blueprint) ----
      function initMarkers(count) {
        defs.selectAll("marker").remove();
        for (let i = 0; i < count; i++) {
          const color = getLinkColorHex(i, count);
          defs.append("marker")
            .attr("id", `cross-marker-${i}`)
            .attr("viewBox", "0 0 100 100")
            .attr("markerWidth", 100).attr("markerHeight", 100)
            .attr("refX", 50).attr("refY", 50)
            .attr("orient", "auto")
            .append("g").call(g => {
              g.append("line")
               .attr("x1", 62.5 - (12.5 - 12.5/1.618)).attr("y1", 25 + 14.5 - 0.23)
               .attr("x2", 62.5 - (12.5 - 12.5/1.618)).attr("y2", 75 - 14.5 + 0.23)
               .attr("stroke", color);
            });

          defs.append("marker")
            .attr("id", `arrow-marker-${i}`)
            .attr("viewBox", "0 0 100 100")
            .attr("markerWidth", 100).attr("markerHeight", 100)
            .attr("refX", 10).attr("refY", 50)
            .attr("orient", "auto")
            .append("g").call(g => {
              g.append("line")
               .attr("x1", 10 + 0.35).attr("y1", 50 + 0.35)
               .attr("x2", 0 - 0.35).attr("y2", 40 - 0.35)
               .attr("stroke", color);
              g.append("line")
               .attr("x1", 10 + 0.35).attr("y1", 50 - 0.35)
               .attr("x2", 0 - 0.35).attr("y2", 60 + 0.35)
               .attr("stroke", color);
            });
        }
      }

      // ---- Path building (from path.mjs, adapted for arbitrary points array) ----
      function buildPathData(points, segLen) {
        const last = points.length - 1;
        const startOffset = START_OFFSET_FRACTION * segLen;
        const endOffset   = END_OFFSET_FRACTION   * segLen;
        const geoStart = offsetPoint(points[0], points[1], startOffset);
        const geoEnd   = offsetPoint(points[last], points[last-1], endOffset);

        const pathPoints = points.map((p, i) =>
          i === 0    ? { x: geoStart.x, y: geoStart.y } :
          i === last ? { x: geoEnd.x,   y: geoEnd.y   } :
          p
        );

        const tangents = pathPoints.map((p, i) => {
          if (i === 0) return vectorSubtract(pathPoints[1], pathPoints[0]);
          if (i === pathPoints.length - 1) return vectorSubtract(pathPoints[i], pathPoints[i-1]);
          return vectorScale(vectorSubtract(pathPoints[i+1], pathPoints[i-1]), 0.5);
        });

        let d = `M ${pathPoints[0].x} ${pathPoints[0].y} `;
        for (let i = 0; i < pathPoints.length - 1; i++) {
          const cp = pathPoints[i], np = pathPoints[i+1];
          const c1 = vectorAdd(cp, vectorScale(tangents[i], 1/3));
          const c2 = vectorSubtract(np, vectorScale(tangents[i+1], 1/3));
          d += `C ${c1.x} ${c1.y}, ${c2.x} ${c2.y}, ${np.x} ${np.y} `;
        }
        return d;
      }

      // ---- Compute current grid layout parameters ----
      function computeGridParams() {
        const centerX = width / 2;
        const centerY = height / 2;
        const gridSize = Math.ceil(Math.sqrt(linkCount));
        const availableSize = Math.min(width, height) * (1 - 2 * paddingFraction);
        const gridUnit = availableSize / (2 * gridSize - 1);
        const cellSpacing = gridSize > 1 ? 2 * gridUnit : availableSize;
        const segLen = gridUnit * 0.35;
        const gridSpacing = gridUnit;
        const halfSpacing = gridUnit / 2;
        const gridStartX = centerX - (gridSize - 1) * cellSpacing / 2;
        const gridStartY = centerY - (gridSize - 1) * cellSpacing / 2;
        const snapThreshold = snapFraction * gridSpacing;
        const cpRadius = radiusFraction * gridSpacing;
        return { centerX, centerY, gridSize, gridUnit, cellSpacing, segLen,
                 gridSpacing, halfSpacing, gridStartX, gridStartY, snapThreshold, cpRadius };
      }

      // ---- Default grid position for link i ----
      function defaultPosition(i, params) {
        const col = i % params.gridSize;
        const row = Math.floor(i / params.gridSize);
        const cx = params.gridStartX + col * params.cellSpacing;
        const cy = params.gridStartY + row * params.cellSpacing;
        return { x: cx, y: cy };
      }

      // ---- Initialize link state ----
      function initLinks() {
        const params = computeGridParams();
        const oldLinks = links;
        links = [];

        // Try to restore from saved settings
        const savedData = loadSettings();
        const savedPositions = savedData?.linkPositions || [];

        for (let i = 0; i < linkCount; i++) {
          const defPos = defaultPosition(i, params);
          let start, center, end;

          if (i < savedPositions.length && savedData?.linkCount === linkCount) {
            // Restore saved positions
            start  = { ...savedPositions[i].start };
            center = { ...savedPositions[i].center };
            end    = { ...savedPositions[i].end };
          } else if (i < oldLinks.length) {
            // Keep existing positions when changing link count
            start  = { ...oldLinks[i].start };
            center = { ...oldLinks[i].center };
            end    = { ...oldLinks[i].end };
          } else {
            // Self-referencing default: all three at the same position
            start  = { ...defPos };
            center = { ...defPos };
            end    = { ...defPos };
          }

          links.push({
            start, center, end,
            preferRight: 0, preferLeft: 0,
          });
        }
      }

      // ---- Recompute IK for a single link ----
      function recomputeIK(link, segLen) {
        const maxReach = IK_SEG_COUNT * segLen;
        const sideTolerance = sideTolFraction * segLen;
        const ik = computeIntermediatePoints(
          link.center, link.start, link.end,
          segLen, maxReach, sideTolerance,
          link.preferRight, link.preferLeft
        );
        link.preferRight = ik.preferRight;
        link.preferLeft  = ik.preferLeft;
        return ik;
      }

      // ---- Update a single link's path and control points (no full re-render) ----
      function updateLink(i) {
        const params = computeGridParams();
        const link = links[i];
        const ik = recomputeIK(link, params.segLen);

        const pts = [
          link.start, ik.p1, ik.p2, ik.p3,
          link.center,
          ik.p4, ik.p5, ik.p6,
          link.end,
        ];
        const pathData = buildPathData(pts, params.segLen);

        // Update path
        linksGroup.select(`path.link-${i}`).attr("d", pathData);

        // Update control point positions
        linksGroup.select(`circle.cp-start-${i}`)
          .attr("cx", link.start.x).attr("cy", link.start.y);
        linksGroup.select(`circle.cp-center-${i}`)
          .attr("cx", link.center.x).attr("cy", link.center.y);
        linksGroup.select(`circle.cp-end-${i}`)
          .attr("cx", link.end.x).attr("cy", link.end.y);
      }

      // ---- Main render ----
      function render() {
        width = innerWidth;
        height = innerHeight;
        svg.attr("width", width).attr("height", height);

        const params = computeGridParams();

        drawBackgroundGrid(params.centerX, params.centerY, params.gridSpacing, params.halfSpacing);
        initMarkers(linkCount);

        // Clear previous links
        linksGroup.selectAll("*").remove();

        for (let i = 0; i < linkCount; i++) {
          const link = links[i];
          const linkColor = getLinkColor(i, linkCount);
          const ik = recomputeIK(link, params.segLen);

          const pts = [
            link.start, ik.p1, ik.p2, ik.p3,
            link.center,
            ik.p4, ik.p5, ik.p6,
            link.end,
          ];
          const pathData = buildPathData(pts, params.segLen);

          // Draw link path with per-link color
          linksGroup.append("path")
            .attr("class", `link-${i}`)
            .attr("fill", "none")
            .attr("stroke", linkColor)
            .attr("stroke-width", strokeFraction * params.segLen)
            .attr("marker-start", `url(#cross-marker-${i})`)
            .attr("marker-end", `url(#arrow-marker-${i})`)
            .attr("d", pathData);

          // Control points styled like blueprint.html:
          // - fill: transparent (rgba(0,0,0,0))
          // - stroke-dasharray: "4 2"
          // - stroke-width: 2
          // - stroke color: green for start, link color for center, red for end

          // Start control point: green stroke
          linksGroup.append("circle")
            .attr("class", `cp-start-${i}`)
            .attr("cx", link.start.x).attr("cy", link.start.y)
            .attr("r", params.cpRadius)
            .attr("fill", "rgba(0,0,0,0)")
            .attr("stroke", "green")
            .attr("stroke-dasharray", "4 2")
            .attr("stroke-width", 2)
            .style("pointer-events", "auto")
            .style("cursor", "grab")
            .datum({ linkIndex: i, pointType: "start" });

          // Center control point: link color stroke
          linksGroup.append("circle")
            .attr("class", `cp-center-${i}`)
            .attr("cx", link.center.x).attr("cy", link.center.y)
            .attr("r", params.cpRadius)
            .attr("fill", "rgba(0,0,0,0)")
            .attr("stroke", linkColor)
            .attr("stroke-dasharray", "4 2")
            .attr("stroke-width", 2)
            .style("pointer-events", "auto")
            .style("cursor", "grab")
            .datum({ linkIndex: i, pointType: "center" });

          // End control point: red stroke
          linksGroup.append("circle")
            .attr("class", `cp-end-${i}`)
            .attr("cx", link.end.x).attr("cy", link.end.y)
            .attr("r", params.cpRadius)
            .attr("fill", "rgba(0,0,0,0)")
            .attr("stroke", "red")
            .attr("stroke-dasharray", "4 2")
            .attr("stroke-width", 2)
            .style("pointer-events", "auto")
            .style("cursor", "grab")
            .datum({ linkIndex: i, pointType: "end" });
        }

        // Attach drag behavior to all control point circles
        attachDrag();
      }

      // ---- D3 drag for control points (like blueprint.html) ----
      function attachDrag() {
        const params = computeGridParams();

        linksGroup.selectAll("circle").call(d3.drag()
          .on("start", function(event, d) {
            isDragging = true;
            d3.select(this).attr("stroke-dasharray", null);
          })
          .on("drag", function(event, d) {
            const source = event.sourceEvent;
            const clientX = source.clientX !== undefined ? source.clientX
                          : source.changedTouches ? source.changedTouches[0].clientX : event.x;
            const clientY = source.clientY !== undefined ? source.clientY
                          : source.changedTouches ? source.changedTouches[0].clientY : event.y;
            const wpt = screenToWorld(clientX, clientY);

            // Snap to half-grid (like blueprint.html)
            const p = computeGridParams();
            const nearestX = p.centerX + Math.round((wpt.x - p.centerX) / p.halfSpacing) * p.halfSpacing;
            const nearestY = p.centerY + Math.round((wpt.y - p.centerY) / p.halfSpacing) * p.halfSpacing;
            const dist = Math.hypot(wpt.x - nearestX, wpt.y - nearestY);
            const nx = dist < p.snapThreshold ? nearestX : wpt.x;
            const ny = dist < p.snapThreshold ? nearestY : wpt.y;

            const link = links[d.linkIndex];

            if (d.pointType === "center") {
              // Move all three points (start, center, end) together
              const dx = nx - link.center.x;
              const dy = ny - link.center.y;
              link.center.x = nx;
              link.center.y = ny;
              link.start.x += dx;
              link.start.y += dy;
              link.end.x += dx;
              link.end.y += dy;
            } else {
              link[d.pointType].x = nx;
              link[d.pointType].y = ny;
            }

            d3.select(this).attr("cx", link[d.pointType === "center" ? "center" : d.pointType].x)
                           .attr("cy", link[d.pointType === "center" ? "center" : d.pointType].y);

            updateLink(d.linkIndex);
          })
          .on("end", function(event, d) {
            isDragging = false;
            d3.select(this).attr("stroke-dasharray", "4 2");
            saveSettings();
          })
        );
      }

      // ---- Init ----
      width = innerWidth;
      height = innerHeight;
      initLinks();
      render();
      addEventListener("resize", () => {
        // On resize, re-render (grid params change)
        width = innerWidth;
        height = innerHeight;
        render();
      });
    })();
  </script>
</body>
</html>
