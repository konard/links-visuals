<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>SVG Transform Marker Test</title>
<style>body{margin:0;background:#E0F7FA;font-family:monospace;}</style>
</head>
<body>

<p>Test A: Path directly in SVG (old approach, no group transform)</p>
<svg width="800" height="80" style="display:block;background:#ddd;">
  <defs>
    <marker id="cA" viewBox="0 0 100 100" markerWidth="100" markerHeight="100" refX="50" refY="50" orient="auto">
      <line x1="55.27" y1="39.27" x2="55.27" y2="60.73" stroke="black" stroke-width="1"/>
    </marker>
    <marker id="aA" viewBox="0 0 100 100" markerWidth="100" markerHeight="100" refX="10" refY="50" orient="auto">
      <line x1="10.35" y1="50.35" x2="-0.35" y2="39.65" stroke="black" stroke-width="1"/>
      <line x1="10.35" y1="49.65" x2="-0.35" y2="60.35" stroke="black" stroke-width="1"/>
    </marker>
  </defs>
  <path d="M 100 40 L 700 40" stroke="black" stroke-width="15" fill="none" 
        marker-start="url(#cA)" marker-end="url(#aA)"/>
</svg>

<p>Test B: Path inside &lt;g transform="translate(0,0) scale(1)"&gt; (new approach)</p>
<svg width="800" height="80" style="display:block;background:#ddd;">
  <defs>
    <marker id="cB" viewBox="0 0 100 100" markerWidth="100" markerHeight="100" refX="50" refY="50" orient="auto">
      <line x1="55.27" y1="39.27" x2="55.27" y2="60.73" stroke="black" stroke-width="1"/>
    </marker>
    <marker id="aB" viewBox="0 0 100 100" markerWidth="100" markerHeight="100" refX="10" refY="50" orient="auto">
      <line x1="10.35" y1="50.35" x2="-0.35" y2="39.65" stroke="black" stroke-width="1"/>
      <line x1="10.35" y1="49.65" x2="-0.35" y2="60.35" stroke="black" stroke-width="1"/>
    </marker>
  </defs>
  <g transform="translate(0,0) scale(1)">
    <path d="M 100 40 L 700 40" stroke="black" stroke-width="15" fill="none" 
          marker-start="url(#cB)" marker-end="url(#aB)"/>
  </g>
</svg>

<p>Test C: Path inside &lt;g&gt; with CSS transform on SVG (old pan/zoom approach)</p>
<div style="overflow:hidden;height:80px;">
<svg width="800" height="80" style="display:block;background:#ddd;transform:translate(0px,0px) scale(1);transform-origin:0 0;">
  <defs>
    <marker id="cC" viewBox="0 0 100 100" markerWidth="100" markerHeight="100" refX="50" refY="50" orient="auto">
      <line x1="55.27" y1="39.27" x2="55.27" y2="60.73" stroke="black" stroke-width="1"/>
    </marker>
    <marker id="aC" viewBox="0 0 100 100" markerWidth="100" markerHeight="100" refX="10" refY="50" orient="auto">
      <line x1="10.35" y1="50.35" x2="-0.35" y2="39.65" stroke="black" stroke-width="1"/>
      <line x1="10.35" y1="49.65" x2="-0.35" y2="60.35" stroke="black" stroke-width="1"/>
    </marker>
  </defs>
  <path d="M 100 40 L 700 40" stroke="black" stroke-width="15" fill="none" 
        marker-start="url(#cC)" marker-end="url(#aC)"/>
</svg>
</div>

<p>Test D: FIXED - markerWidth=1.5, markerHeight=1.5 (proportionate)</p>
<svg width="800" height="80" style="display:block;background:#ddd;">
  <defs>
    <marker id="cD" viewBox="0 0 100 100" markerWidth="1.5" markerHeight="1.5" refX="50" refY="50" orient="auto">
      <line x1="55.27" y1="39.27" x2="55.27" y2="60.73" stroke="black" stroke-width="60"/>
    </marker>
    <marker id="aD" viewBox="0 0 100 100" markerWidth="1.5" markerHeight="1.5" refX="10" refY="50" orient="auto">
      <line x1="10.35" y1="50.35" x2="-0.35" y2="39.65" stroke="black" stroke-width="60"/>
      <line x1="10.35" y1="49.65" x2="-0.35" y2="60.35" stroke="black" stroke-width="60"/>
    </marker>
  </defs>
  <g transform="translate(0,0) scale(1)">
    <path d="M 100 40 L 700 40" stroke="black" stroke-width="15" fill="none" 
          marker-start="url(#cD)" marker-end="url(#aD)"/>
  </g>
</svg>

</body>
</html>
