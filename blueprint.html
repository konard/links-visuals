<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Link blueprint</title>

  <style>
    html, body { margin:0; padding:0; background:#E0F7FA; height:100%; overflow:hidden; }
    svg        { display:block; touch-action:none; }
    canvas#render-canvas { display:none; position:fixed; top:0; left:0; touch-action:none; z-index:1; }

    /* ---- coordinates HUD ---- */
    #coordinates{
      position:fixed; bottom:1vmin; left:1vmin; z-index:10;
      background:rgba(0,0,128,.5); color:#fff;
      padding:0.7vmin; font:clamp(9px,1.2vmin,14px)/1.3 "Consolas","Courier New",monospace;
      border-radius:0.4vmin; white-space:pre;
      transition: opacity 0.2s;
    }

    /* ---- config panel ---- */
    #config-panel{
      position:fixed; bottom:1vmin; right:1vmin; z-index:10;
      background:rgba(0,0,128,.5); color:#fff;
      padding:0.7vmin; font:clamp(9px,1.2vmin,14px)/1.3 "Consolas","Courier New",monospace;
      border-radius:0.4vmin;
      transition: opacity 0.2s;
    }
    #config-panel label{ display:block; margin-bottom:0.3vmin; }
    #config-panel input[type=range]{ width:12vw; min-width:80px; vertical-align:middle; }
    #config-panel .val{ display:inline-block; width:3vw; min-width:28px; text-align:right; }
    #config-panel .mode-row {
      display:flex; align-items:center; gap:0.5vmin; margin-bottom:0.3vmin;
    }
    #config-panel .mode-row button {
      background:rgba(255,255,255,0.15); color:#fff;
      border:1px solid rgba(255,255,255,0.4); border-radius:0.3vmin;
      padding:0.2vmin 0.6vmin; font-size:inherit; cursor:pointer;
    }
    #config-panel .mode-row button.active {
      background:rgba(255,255,255,0.4); font-weight:bold;
    }
    #config-panel .mode-row button:hover { background:rgba(255,255,255,0.3); }

    /* ---- toggle button ---- */
    #toggle-panels{
      position:fixed; top:1vmin; right:1vmin;
      background:rgba(0,0,128,.7); color:#fff;
      border:none; border-radius:0.4vmin;
      padding:0.6vmin 1vmin; font-size:clamp(10px,1.4vmin,16px);
      cursor:pointer; z-index:100;
      line-height:1;
    }
    #toggle-panels:hover{ background:rgba(0,0,128,.9); }

    /* ---- hidden state ---- */
    .panels-hidden #coordinates,
    .panels-hidden #config-panel { opacity:0; pointer-events:none; }

    /* ---- mobile layout (< 600px) ---- */
    @media (max-width:599px){
      #coordinates{
        bottom:auto; top:0; left:0; right:0;
        border-radius:0; padding:1.5vw;
        font-size:clamp(10px,3vw,14px);
      }
      #config-panel{
        bottom:0; left:0; right:0;
        border-radius:0; padding:1.5vw;
        font-size:clamp(12px,3.5vw,16px);
      }
      #config-panel input[type=range]{
        width:50vw; min-width:120px;
        height:28px;   /* finger-friendly */
      }
      #config-panel .val{ width:8vw; min-width:36px; }
      #toggle-panels{
        top:1.5vw; right:1.5vw;
        font-size:clamp(14px,4vw,20px);
        padding:1vw 1.5vw;
      }
    }
  </style>
</head>
<body>
  <div id="coordinates"></div>

  <div id="config-panel">
    <label>Start offset: <input type="range" id="startOffsetSlider" min="0" max="2" value="0.10" step="0.01"> <span class="val" id="startOffsetVal">0.10</span> u</label>
    <label>End offset: &nbsp; <input type="range" id="endOffsetSlider"   min="0" max="2" value="0.16" step="0.01"> <span class="val" id="endOffsetVal">0.16</span> u</label>
    <div class="mode-row">
      Layout:
      <button id="layoutAutoBtn" class="active" title="Auto layout — IK solver positions intermediate points">Auto</button>
      <button id="layoutManualBtn" title="Manual layout — drag intermediate points freely">Manual</button>
    </div>
    <div class="mode-row">
      Render:
      <button id="renderSVGBtn" class="active" title="SVG vector rendering — crisp at any zoom">SVG</button>
      <button id="renderCanvasBtn" title="Canvas raster rendering">Canvas</button>
    </div>
    <div class="mode-row">
      <button id="resetBtn" title="Reset all settings to defaults">Reset</button>
    </div>
  </div>

  <button id="toggle-panels" title="Show/hide panels">☰</button>

  <canvas id="render-canvas"></canvas>

  <script type="module">
    const { use } = await import("https://esm.sh/use-m");
    (async () => {
      const d3 = await use('d3');

      // Inject d3 into modules that need it before any init calls.
      const { setD3: svgSetD3 } = await import('./js/svg-setup.mjs');
      const { setD3: cpSetD3  } = await import('./js/control-points.mjs');
      svgSetD3(d3);
      cpSetD3(d3);

      const { initPanelsToggle }       = await import('./js/panels.mjs');
      const { initSliders }            = await import('./js/sliders.mjs');
      const { initSVG, screenToWorld } = await import('./js/svg-setup.mjs');
      const { initControlPoints }      = await import('./js/control-points.mjs');
      const { initCanvasZoomPan }      = await import('./js/zoom-pan.mjs');
      const { resize }                 = await import('./js/resize.mjs');
      const { startAnimationLoop }     = await import('./js/animation.mjs');
      const { updatePath }             = await import('./js/path.mjs');
      const { updateIntermediateViaIK }= await import('./js/ik.mjs');
      const state                      = await import('./js/state.mjs');

      // --- LocalStorage persistence ---
      const STORAGE_KEY = 'blueprint-settings';

      function saveSettings() {
        const data = {
          layoutMode,
          startOffsetFraction: state.startOffsetFraction,
          endOffsetFraction: state.endOffsetFraction,
          points: state.points.map(p => ({ id: p.id, xFactor: p.xFactor, yFactor: p.yFactor })),
        };
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
      }

      function loadSettings() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return null;
          return JSON.parse(raw);
        } catch { return null; }
      }

      // --- Layout mode: "auto" (IK animated) or "manual" (user-draggable p1–p6) ---
      let layoutMode = 'auto';  // default to auto (animated)

      const layoutAutoBtn   = document.getElementById('layoutAutoBtn');
      const layoutManualBtn = document.getElementById('layoutManualBtn');

      function setLayoutMode(mode) {
        layoutMode = mode;
        if (mode === 'auto') {
          layoutAutoBtn.classList.add('active');
          layoutManualBtn.classList.remove('active');
          // IK owns p1–p6: make them non-draggable
          state.points.forEach(p => {
            if (p.type === 'intermediate') p.draggable = false;
          });
          // Don't force animationEnabled here — let the first drag of
          // start/end trigger it, matching animated-blueprint.html behavior.
        } else {
          layoutAutoBtn.classList.remove('active');
          layoutManualBtn.classList.add('active');
          // User owns p1–p6: make them draggable
          state.points.forEach(p => {
            if (p.type === 'intermediate') p.draggable = true;
          });
          state.setAnimationEnabled(false);
        }
        // Update pointer-events and re-wire drag handlers
        if (state.circles) {
          state.circles.style('pointer-events', d => d.draggable ? 'auto' : 'none');
          // Remove all existing drag handlers, then re-attach for draggable points
          state.circles.on('.drag', null);
          state.circles.filter(d => d.draggable).call(d3.drag()
            .on('start', function(ev, d) {
              d3.select(this).attr('stroke-dasharray', null);
              if (d.id === 'start' || d.id === 'end') {
                state.setAnimationEnabled(true);
              }
            })
            .on('drag', function(ev, d) {
              const src = ev.sourceEvent;
              const clientX = src.clientX !== undefined ? src.clientX
                            : src.changedTouches ? src.changedTouches[0].clientX : ev.x;
              const clientY = src.clientY !== undefined ? src.clientY
                            : src.changedTouches ? src.changedTouches[0].clientY : ev.y;
              const wpt  = screenToWorld(clientX, clientY);
              const nx   = state.centerX + Math.round((wpt.x - state.centerX) / state.halfSpacing) * state.halfSpacing;
              const ny   = state.centerY + Math.round((wpt.y - state.centerY) / state.halfSpacing) * state.halfSpacing;
              const dist = Math.hypot(wpt.x - nx, wpt.y - ny);
              d.x = dist < state.snapThreshold ? nx : wpt.x;
              d.y = dist < state.snapThreshold ? ny : wpt.y;
              d3.select(this).attr('cx', d.x).attr('cy', d.y);
              updatePath();
            })
            .on('end', function(ev, d) {
              d.xFactor = (d.x - state.centerX) / state.gridSpacing;
              d.yFactor = (d.y - state.centerY) / state.gridSpacing;
              d3.select(this).attr('stroke-dasharray', '4 2');
              updatePath();
              saveSettings();
            })
          );
        }
      }

      layoutAutoBtn.addEventListener('click',   () => { setLayoutMode('auto'); saveSettings(); });
      layoutManualBtn.addEventListener('click', () => { setLayoutMode('manual'); saveSettings(); });

      // Restore saved settings before init
      const saved = loadSettings();
      if (saved) {
        if (saved.startOffsetFraction != null) state.setStartOffsetFraction(saved.startOffsetFraction);
        if (saved.endOffsetFraction != null) state.setEndOffsetFraction(saved.endOffsetFraction);
        if (saved.points) {
          for (const sp of saved.points) {
            const p = state.byId[sp.id];
            if (p) { p.xFactor = sp.xFactor; p.yFactor = sp.yFactor; }
          }
        }
      }

      initPanelsToggle();
      initSliders();
      initSVG();
      initControlPoints();
      initCanvasZoomPan();
      addEventListener('resize', resize);
      resize();

      // Sync slider UI with restored values
      const startSlider = document.getElementById('startOffsetSlider');
      const endSlider   = document.getElementById('endOffsetSlider');
      const startVal    = document.getElementById('startOffsetVal');
      const endVal      = document.getElementById('endOffsetVal');
      startSlider.value = state.startOffsetFraction;
      endSlider.value   = state.endOffsetFraction;
      startVal.textContent = state.startOffsetFraction.toFixed(2);
      endVal.textContent   = state.endOffsetFraction.toFixed(2);

      // Save on slider change
      startSlider.addEventListener('input', () => saveSettings());
      endSlider.addEventListener('input', () => saveSettings());

      // Reset button
      document.getElementById('resetBtn').addEventListener('click', () => {
        localStorage.removeItem(STORAGE_KEY);
        // Restore default point factors
        const defaults = [
          { id:"start", xFactor:-4, yFactor:0 },
          { id:"p1",    xFactor:-3, yFactor:0 },
          { id:"p2",    xFactor:-2, yFactor:0 },
          { id:"p3",    xFactor:-1, yFactor:0 },
          { id:"center",xFactor: 0, yFactor:0 },
          { id:"p4",    xFactor: 1, yFactor:0 },
          { id:"p5",    xFactor: 2, yFactor:0 },
          { id:"p6",    xFactor: 3, yFactor:0 },
          { id:"end",   xFactor: 4, yFactor:0 },
        ];
        for (const d of defaults) {
          const p = state.byId[d.id];
          if (p) { p.xFactor = d.xFactor; p.yFactor = d.yFactor; }
        }
        state.setStartOffsetFraction(0.10);
        state.setEndOffsetFraction(0.16);
        startSlider.value = 0.10;
        endSlider.value = 0.16;
        startVal.textContent = '0.10';
        endVal.textContent = '0.16';
        setLayoutMode('auto');
        resize();
      });

      // Apply initial layout mode (restore saved or default to auto)
      const initialMode = saved?.layoutMode || 'auto';
      setLayoutMode(initialMode);

      // In auto mode, enable animation immediately so IK computes the
      // initial wave shape on the first frame (instead of waiting for drag).
      if (initialMode === 'auto') {
        state.setAnimationEnabled(true);
      }

      startAnimationLoop();
    })();
  </script>
</body>
</html>
